services:
  neo4j:
    uri: ${NEO4J_URI}
    user: ${NEO4J_USER}
    database: neo4j
  qdrant:
    url: ${QDRANT_URL}
    collection: medical_papers
data_ingestion:
  project_root: .
  input_dir: ../data/pdfs
  log_file: ../data/artifacts/ingestion.log
  output:
    ocr_dir: ../data/artifacts/extract
    markdown_dir: ../data/artifacts/convert
    cleaned_dir: ../data/artifacts/clean
    chunks_dir: ../data/artifacts/chunk
  ocr:
    langs:
    - en
    device: mps
    det_batch_size: 2
    rec_batch_size: 16
    image_scale: 2
    output_dir: ../data/artifacts/extract
    confidence_threshold: 0.8
    save_debug_images: true
    max_pages: null
  conversion:
    infer_headers: true
    preserve_spacing: true
    paragraph_gap_multiplier: 2.0
    bold_header_max_chars: 50
  cleaning:
    remove_phantom_links: true
    remove_images: true
    linearize_tables: true
    fix_hyphenation: true
    collapse_whitespace: true
    remove_pii: true
    fail_safe_on_pii_error: true
    language: en
    pii_entities:
    - EMAIL_ADDRESS
    - SG_NRIC
    pii_replacements:
      DEFAULT: <REDACTED>
      EMAIL_ADDRESS: <EMAIL>
      SG_NRIC: <NRIC_ID>
    custom_recognizers:
    - entity: SG_NRIC
      regex: (?i)[STFG]\d{7}[A-Z]
      score: 1.0
  chunking:
    max_tokens: 500
    chunk_overlap: 50
    min_chunk_tokens: 20
    filter_boilerplate: true   # strip preprint header/footer watermarks before indexing
    headers_to_split:
    - '#'
    - '##'
    - '###'
    respect_atomic_blocks: true
  vectorization:
    model_name: BAAI/bge-small-en-v1.5
    model_cache_dir: data/models
    embedding_dim: 384
    device: cpu
    normalize_embeddings: false
    distance_metric: cosine
    qdrant_url: ${QDRANT_URL}
    collection_name: medical_papers
    batch_size: 64
  neo4j:
    uri: ${NEO4J_URI}
    user: ${NEO4J_USER}
    password: ${NEO4J_PASSWORD}
    database: neo4j
  knowledge_graph:
    enabled: true
    model: qwen3-8b
    chat_url: ${LM_STUDIO_BASE_URL}/chat/completions
    max_retries: 2
    timeout_seconds: 180
    max_tokens: 1024
    max_text_chars: 1500
    min_chunk_chars: 50
    relation_verbs:
      - TREATS
      - CAUSES
      - PREVENTS
      - INHIBITS
      - INTERACTS_WITH
      - PREDICTS
      - MEASURED_BY
      - ASSOCIATED_WITH
      - REDUCES
      - INCREASES
      - DIVERGES_FROM
      - DEFINED_BY
    few_shot_examples:
      - text: "The primary analysis used MIMIC-IV v3.1 (n=65,241 adult ICU stays) at BIDMC."
        output: '{"triplets":[{"head":"MIMIC-IV V3.1","relation":"ASSOCIATED_WITH","tail":"BIDMC","tier":1}]}'
      - text: "Biological features predicted Sepsis-3 labels with AUROC 0.901."
        output: '{"triplets":[{"head":"BIOLOGICAL FEATURES","relation":"PREDICTS","tail":"SEPSIS-3","tier":1},{"head":"BIOLOGICAL FEATURES","relation":"MEASURED_BY","tail":"AUROC","tier":1}]}'
      - text: "Sepsis-2 and Sepsis-3 agreed highly (Jaccard 0.903), but both diverged from CMS SEP-1."
        output: '{"triplets":[{"head":"SEPSIS-2","relation":"ASSOCIATED_WITH","tail":"SEPSIS-3","tier":1},{"head":"SEPSIS-2","relation":"DIVERGES_FROM","tail":"CMS SEP-1","tier":1},{"head":"SEPSIS-3","relation":"DIVERGES_FROM","tail":"CMS SEP-1","tier":1}]}'
  retrieval:
    default_limit: 3
    hybrid_search: true
    reranker_model: BAAI/bge-reranker-base
    retrieval_k: null           # over-fetch multiplier; null = default_limit * 2 when reranker active
    graph_facts_limit: 10       # max Neo4j facts injected per vector result
  pipeline:
    skip_existing: false
    max_retries: 1
    parallel_workers: 1
  logging:
    level: INFO
    save_artifacts: true
    console_level: INFO
    file_level: DEBUG
    max_size_mb: 50
    backup_count: 3
data_acquisition:
  defaults:
    storage_mode: local
    default_source: medrxiv
    default_limit: 5
    output_dir: ../../data/pdfs
  sources:
    biorxiv:
      name: biorxiv
      description: Fetch medical preprint PDFs from bioRxiv via the arXiv API (q-bio
        papers with 10.1101 DOIs)
      type: api
      enabled: true
      api:
        base_url: https://arxiv.org
        search_endpoint: /search/
        pdf_url_pattern: https://arxiv.org/pdf/{arxiv_id}
        timeout_seconds: 60
        max_retries: 3
        user_agent: Multi-Cloud-GraphRAG/1.0 (https://github.com/YOUR-USERNAME/data-acquisition-multicloud)
      rate_limit:
        calls_per_minute: 30
        concurrency: 2
        burst_size: 5
      search:
        default_query: cancer immunotherapy
        biorxiv_filter: (all:bioRxiv OR all:q-bio)
        max_results_per_query: 50
        max_pdfs_per_run: 20
        sort_by: submittedDate
        categories:
          oncology:
          - cancer
          - tumor
          - oncology
          - carcinoma
          - metastasis
          - chemotherapy
          - neoplasm
          - malignant
          cardiology:
          - heart
          - cardiac
          - cardiovascular
          - myocardial
          - arrhythmia
          - hypertension
          - atherosclerosis
          neurology:
          - brain
          - neural
          - neuro
          - stroke
          - alzheimer
          - parkinson
          - epilepsy
          - dementia
          infectious_disease:
          - virus
          - bacterial
          - infection
          - pandemic
          - covid
          - pathogen
          - antibiotic
          - viral
          immunology:
          - immune
          - antibody
          - vaccine
          - immunotherapy
          - cytokine
          - autoimmune
          - inflammation
          genetics:
          - mutation
          - gene
          - genetic
          - variant
          - genome
          - CRISPR
          - genomic
          - hereditary
          pharmacology:
          - drug
          - therapeutic
          - treatment
          - compound
          - pharmacology
          - dosage
          - efficacy
          diagnostics:
          - biomarker
          - diagnostic
          - imaging
          - detection
          - screening
          - MRI
          - radiology
          - pathology
          epidemiology:
          - epidemiology
          - prevalence
          - incidence
          - cohort
          - population
          - mortality
          - morbidity
          public_health:
          - public health
          - healthcare
          - policy
          - intervention
          - prevention
          - global health
      storage:
        primary:
          provider: aws
          bucket: clinical-trials-pdfs
          region: ap-south-1
          prefix: raw/biorxiv/
        fallback:
          provider: azure
          container: clinical-trials-fallback
          prefix: raw/biorxiv/
      metadata:
        version: '1.0'
        include_fields:
        - nct_id
        - brief_title
        - official_title
        - lead_sponsor_name
        - study_type
        - last_update_post_date
        custom_fields:
        - fetched_at
        - source_version
        - pdf_type
        - doi
        - authors
        - summary
        - arxiv_id
      processing:
        tiers:
          primary:
            type: gpu_spot
            instance: g4dn.xlarge
            max_cost_per_hour: 0.15
            timeout_minutes: 30
          fallback_1:
            type: azure_di
            max_cost_per_page: 0.0015
            timeout_minutes: 10
          fallback_2:
            type: cpu_tesseract
            max_cost_per_hour: 0.01
            timeout_minutes: 60
        quality_thresholds:
          min_entity_accuracy: 0.85
          max_hallucination_rate: 0.05
      metrics:
        enabled: true
        push_to_prometheus: true
        track:
        - download_duration
        - upload_duration
        - file_size_bytes
        - fallback_reason
        - cost_per_document
        alerts:
          fallback_rate_threshold: 0.15
          cost_spike_threshold: 50
          silent_failure_threshold: 0.01
      cost_tracking:
        budget_daily: 10
        budget_monthly: 50
        alert_at_percent: 80
        rates:
          gpu_spot: 0.12
          azure_di: 0.0015
          cpu_tesseract: 0.01
          s3_storage: 0.023
          metadata_storage: 0.0001
    clinical_trials:
      name: clinical_trials
      description: Fetch protocol and results PDFs from ClinicalTrials.gov with multi-cloud
        fallback
      type: api
      enabled: true
      api:
        base_url: https://clinicaltrials.gov
        search_endpoint: /api/v2/studies
        pdf_patterns:
          protocol: https://clinicaltrials.gov/ProvidedDocs/{last_two}/{nct_id}/Prot_{nct_id}.pdf
          results: https://clinicaltrials.gov/ProvidedDocs/{last_two}/{nct_id}/Results_{nct_id}.pdf
        timeout_seconds: 30
        max_retries: 3
        user_agent: Multi-Cloud-GraphRAG/1.0 (https://github.com/YOUR-USERNAME/data-acquisition-multicloud)
      rate_limit:
        calls_per_minute: 100
        concurrency: 3
        burst_size: 10
      search:
        default_query: cancer immunotherapy
        max_studies_per_query: 100
        max_pdfs_per_run: 50
        fields:
        - nct_id
        - brief_title
        - official_title
        - overall_status
        - lead_sponsor_name
        - study_type
        - phase
        - enrollment_count
        - last_update_post_date
      storage:
        primary:
          provider: aws
          bucket: clinical-trials-pdfs
          region: ap-south-1
          prefix: raw/clinical_trials/
        fallback:
          provider: azure
          container: clinical-trials-fallback
          prefix: raw/clinical_trials/
      metadata:
        version: '1.0'
        include_fields:
        - nct_id
        - brief_title
        - overall_status
        - lead_sponsor_name
        - study_type
        - phase
        - enrollment_count
        - last_update_post_date
        custom_fields:
        - fetched_at
        - source_version
        - pdf_type
        - processing_tier
      processing:
        tiers:
          primary:
            type: gpu_spot
            instance: g4dn.xlarge
            max_cost_per_hour: 0.15
            timeout_minutes: 30
          fallback_1:
            type: azure_di
            max_cost_per_page: 0.0015
            timeout_minutes: 10
          fallback_2:
            type: cpu_tesseract
            max_cost_per_hour: 0.01
            timeout_minutes: 60
        quality_thresholds:
          min_entity_accuracy: 0.85
          max_hallucination_rate: 0.05
          required_fields:
          - drug_names
          - dosages
          - dates
      metrics:
        enabled: true
        push_to_prometheus: true
        track:
        - download_duration
        - upload_duration
        - file_size_bytes
        - fallback_reason
        - cost_per_document
        - extraction_quality
        alerts:
          fallback_rate_threshold: 0.15
          cost_spike_threshold: 50
          silent_failure_threshold: 0.01
      chaos:
        enabled: true
        simulate_failures:
          spot_termination_probability: 0.05
          api_rate_limit_probability: 0.02
          s3_unavailable_probability: 0.01
          azure_di_throttle_probability: 0.03
        recovery_targets:
          spot_termination_seconds: 45
          api_rate_limit_seconds: 10
          cloud_failover_seconds: 120
      quality_validation:
        sample_rate: 0.1
        metrics:
          recall_5_target: 0.85
          ndcg_5_target: 0.8
          entity_accuracy_target: 0.9
          hallucination_rate_max: 0.03
      cost_tracking:
        budget_daily: 10
        budget_monthly: 50
        alert_at_percent: 80
        rates:
          gpu_spot: 0.12
          azure_di: 0.0015
          cpu_tesseract: 0.01
          s3_storage: 0.023
          metadata_storage: 0.0001
    medrxiv:
      name: medrxiv
      description: Fetch health-sciences preprint PDFs from medRxiv via the medRxiv
        REST API
      type: api
      enabled: true
      api:
        base_url: https://api.medrxiv.org
        details_endpoint: /details/medrxiv
        pdf_url_pattern: https://www.medrxiv.org/content/{doi}.full.pdf
        timeout_seconds: 60
        max_retries: 3
        user_agent: Multi-Cloud-GraphRAG/1.0 (https://github.com/YOUR-USERNAME/data-acquisition-multicloud)
        lookback_days: 30
        page_size: 100
      rate_limit:
        calls_per_minute: 20
        concurrency: 2
        burst_size: 5
      search:
        default_query: clinical trial treatment
        max_results_per_query: 50
        max_pdfs_per_run: 20
        categories:
          oncology:
          - cancer
          - tumor
          - oncology
          - carcinoma
          - metastasis
          - chemotherapy
          - neoplasm
          - malignant
          cardiology:
          - heart
          - cardiac
          - cardiovascular
          - myocardial
          - arrhythmia
          - hypertension
          - atherosclerosis
          neurology:
          - brain
          - neural
          - neuro
          - stroke
          - alzheimer
          - parkinson
          - epilepsy
          - dementia
          infectious_disease:
          - virus
          - bacterial
          - infection
          - pandemic
          - covid
          - pathogen
          - antibiotic
          - viral
          immunology:
          - immune
          - antibody
          - vaccine
          - immunotherapy
          - cytokine
          - autoimmune
          - inflammation
          genetics:
          - mutation
          - gene
          - genetic
          - variant
          - genome
          - CRISPR
          - genomic
          - hereditary
          pharmacology:
          - drug
          - therapeutic
          - treatment
          - compound
          - pharmacology
          - dosage
          - efficacy
          diagnostics:
          - biomarker
          - diagnostic
          - imaging
          - detection
          - screening
          - MRI
          - radiology
          - pathology
          epidemiology:
          - epidemiology
          - prevalence
          - incidence
          - cohort
          - population
          - mortality
          - morbidity
          public_health:
          - public health
          - healthcare
          - policy
          - intervention
          - prevention
          - global health
      storage:
        primary:
          provider: aws
          bucket: clinical-trials-pdfs
          region: ap-south-1
          prefix: raw/medrxiv/
        fallback:
          provider: azure
          container: clinical-trials-fallback
          prefix: raw/medrxiv/
      metadata:
        version: '1.0'
        include_fields:
        - nct_id
        - brief_title
        - official_title
        - lead_sponsor_name
        - study_type
        - last_update_post_date
        custom_fields:
        - fetched_at
        - source_version
        - pdf_type
        - doi
        - authors
        - abstract
        - medrxiv_category
        - published_date
        - version
      processing:
        tiers:
          primary:
            type: gpu_spot
            instance: g4dn.xlarge
            max_cost_per_hour: 0.15
            timeout_minutes: 30
          fallback_1:
            type: azure_di
            max_cost_per_page: 0.0015
            timeout_minutes: 10
          fallback_2:
            type: cpu_tesseract
            max_cost_per_hour: 0.01
            timeout_minutes: 60
        quality_thresholds:
          min_entity_accuracy: 0.85
          max_hallucination_rate: 0.05
      metrics:
        enabled: true
        push_to_prometheus: true
        track:
        - download_duration
        - upload_duration
        - file_size_bytes
        - fallback_reason
        - cost_per_document
        alerts:
          fallback_rate_threshold: 0.15
          cost_spike_threshold: 50
          silent_failure_threshold: 0.01
      cost_tracking:
        budget_daily: 10
        budget_monthly: 50
        alert_at_percent: 80
        rates:
          gpu_spot: 0.12
          azure_di: 0.0015
          cpu_tesseract: 0.01
          s3_storage: 0.023
          metadata_storage: 0.0001
    pubmed:
      name: pubmed
      description: Fetch full-text PDFs from PubMed Central (PMC) via NCBI E-utilities
      type: api
      enabled: true
      api:
        base_url: https://eutils.ncbi.nlm.nih.gov/entrez/eutils
        search_endpoint: /esearch.fcgi
        summary_endpoint: /esummary.fcgi
        pdf_base_url: https://www.ncbi.nlm.nih.gov/pmc/articles
        oa_service_url: https://www.ncbi.nlm.nih.gov/pmc/utils/oa/oa.fcgi
        ftp_https_mirror: https://ftp.ncbi.nlm.nih.gov
        pdf_patterns:
          fulltext: https://www.ncbi.nlm.nih.gov/pmc/articles/PMC{nct_id}/pdf/
        min_pdf_bytes: 51200
        timeout_seconds: 30
        max_retries: 3
        user_agent: Multi-Cloud-GraphRAG/1.0 (tool=multi-cloud-graphrag; email=contact@example.com)
        api_key_env: NCBI_API_KEY
      rate_limit:
        calls_per_minute: 180
        concurrency: 3
        burst_size: 5
      search:
        db: pmc
        default_query: cancer immunotherapy
        max_studies_per_query: 100
        max_pdfs_per_run: 50
        open_access_filter: open access[filter]
        fields:
        - uid
        - title
        - source
        - authors
        - pubdate
        - fulljournalname
        - doi
      storage:
        primary:
          provider: aws
          bucket: clinical-trials-pdfs
          region: ap-south-1
          prefix: raw/pubmed/
        fallback:
          provider: azure
          container: clinical-trials-fallback
          prefix: raw/pubmed/
      metadata:
        version: '1.0'
        include_fields:
        - pmcid
        - title
        - journal
        - authors
        - pubdate
        - doi
        custom_fields:
        - fetched_at
        - source_version
        - pdf_type
        - processing_tier
      cost_tracking:
        budget_daily: 10
        budget_monthly: 50
        alert_at_percent: 80
        rates:
          s3_storage: 0.023
          metadata_storage: 0.0001
  storage:
    aws_s3:
      provider: aws
      profile: clinical-trials-fetcher
      region: ap-south-1
      default: true
      buckets:
        clinical-trials-pdfs:
          name: clinical-trials-pdfs-prod-ap-south-1--aps1-az1--x-s3
          region: ap-south-1
          versioning: true
          encryption: AES256
          lifecycle_days: 365
          paths:
            raw: raw/{source}/{year}/{month}/{day}/{nct_id}/{pdf_type}.pdf
            metadata: metadata/{source}/{year}/{month}/{day}/{nct_id}.json
            manifests: manifests/{source}/{run_id}.json
            quality_reports: quality/{source}/{date}/sample_{sample_id}.json
        metrics-store:
          name: graphrag-metrics
          region: ap-south-1
          versioning: false
          encryption: AES256
          lifecycle_days: 90
          paths:
            cost_reports: cost/{year}/{month}/daily.json
            performance: performance/{year}/{month}/latency.json
            fallback_events: fallback/{year}/{month}/events.json
      retry:
        max_attempts: 3
        backoff_factor: 1.5
        jitter: true
      multipart:
        threshold_mb: 100
        chunk_size_mb: 10
      cost:
        storage_per_gb: 0.023
        glacier_per_gb: 0.004
        put_requests: 0.005
        get_requests: 0.0004
        tracking:
          enabled: true
          tag_uploads: true
          tags:
            project: multi-cloud-graphrag
            source: clinical_trials
            environment: production
      monitoring:
        cloudwatch_metrics: true
        namespace: GraphRAG/ClinicalTrials
        alarms:
          upload_failure_rate:
            threshold: 0.05
            period_seconds: 300
          bucket_size_gb:
            threshold: 100
            period_days: 7
    azure_blob:
      provider: azure
      connection_string: ${AZURE_STORAGE_CONNECTION_STRING}
      default: false
      account: ${AZURE_STORAGE_ACCOUNT}
      resource_group: ${AZURE_STORAGE_RESOURCE_GROUP}
      location: centralindia
      containers:
        clinical-trials-fallback:
          name: clinical-trials-fallback
          access_level: private
          versioning: true
          default_encryption: true
          paths:
            raw: raw/{source}/{year}/{month}/{day}/{nct_id}/{pdf_type}.pdf
            metadata: metadata/{source}/{year}/{month}/{day}/{nct_id}.json
            manifests: manifests/{source}/{run_id}.json
        metrics-fallback:
          name: graphrag-metrics-fallback
          access_level: private
          versioning: false
          paths:
            fallback_events: fallback/{year}/{month}/events.json
            cost_alerts: alerts/cost/{date}.json
      retry:
        max_attempts: 3
        backoff_factor: 2.0
        timeout_seconds: 60
      cost:
        hot_storage_per_gb: 0.018
        cool_storage_per_gb: 0.01
        write_operations: 0.05
        read_operations: 0.004
        tracking:
          enabled: true
          budget_daily: 5
          alert_when_percent: 80
          tags:
            project: multi-cloud-graphrag
            source: clinical_trials
            tier: fallback
      fallback_triggers:
      - aws_s3_unavailable
      - aws_s3_throttling
      - cost_threshold_exceeded
      - manual_override
      monitoring:
        azure_monitor: true
        log_analytics_workspace: ${AZURE_WORKSPACE_ID}
        alerts:
          fallback_activated:
            severity: 2
            action_group: email-infra-team
    local_fallback:
      provider: local
      enabled: true
      priority: 1
      paths:
        base_dir: ../data/pdfs
        raw: '{base_dir}/raw/{source}/{year}/{month}/{day}/{nct_id}/'
        metadata: '{base_dir}/metadata/{source}/{year}/{month}/{day}/'
        manifests: '{base_dir}/manifests/{source}/'
      retention_days: 365
      triggers:
      - local_mode_default
      cleanup:
        enabled: false
        min_free_space_gb: 10
      metrics:
        track_disk_usage: true
        track_file_count: true
        alert_at_percent: 90
    providers:
      chain:
      - provider: local
        priority: 1
        default: true
agentic_reasoning:
  agent:
    model: lmstudio/mradermacher/Llama-3.1-8B-UltraMedical-GGUF
    system_prompt: >-
      You are a clinical research assistant with access to an internal knowledge base.
      You operate in a two-phase pipeline: evidence is always retrieved before you respond.

      Synthesis rules:
      - Answer ONLY from the [EVIDENCE] block provided in the user message.
      - If evidence is empty or found=false, respond exactly: "No evidence found for this query."
      - Do NOT use parametric memory or training knowledge when evidence is available.
      - Cite document sources, chunk IDs, or trial IDs from vector_results when present.
      - Structure your response: key findings → evidence gaps → clinical implications.
    model_params:
      temperature: 0.1
      max_tokens: 4096
      top_p: 0.9
      frequency_penalty: 0.0
      presence_penalty: 0.0

  graphrag:
    config:
      qdrant_url: ${QDRANT_URL}
      collection: medical_papers
      neo4j_uri: ${NEO4J_URI}
      neo4j_username: ${NEO4J_USER}
      neo4j_password: ${NEO4J_PASSWORD}
      embedding_model: BAAI/bge-small-en-v1.5
      model_cache_dir: data/models
      limit: 3
      neo4j_limit: 10
      reranker_model: BAAI/bge-reranker-base
      retrieval_k: null
      cache_ttl: 300
      cache_maxsize: 128
