name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'data-acquisition/**'
              - 'data-ingestion/**'
              - 'agentic-reasoning/**'
            ui:
              - 'platform-ui/**'

  python-lint-test:
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [data-acquisition, data-ingestion, agentic-reasoning]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        working-directory: ${{ matrix.module }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install ruff pytest
      - name: Lint (ruff)
        working-directory: ${{ matrix.module }}
        run: ruff check .
      - name: Unit tests (no live DB/docker)
        working-directory: ${{ matrix.module }}
        run: pytest -m "not integration" --tb=short

  ui-lint-build:
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: platform-ui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # Single job every PR can require in branch protection,
  # even when path-filtered jobs above were skipped.
  ci-summary:
    needs: [changes, python-lint-test, ui-lint-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.python-lint-test.result }}" == "failure" ] || [ "${{ needs.ui-lint-build.result }}" == "failure" ]; then
            echo "CI failed"
            exit 1
          fi
          echo "CI passed (or was correctly skipped for unrelated paths)"
