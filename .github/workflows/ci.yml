name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      data-acquisition: ${{ steps.filter.outputs.data-acquisition }}
      data-ingestion: ${{ steps.filter.outputs.data-ingestion }}
      agentic-reasoning: ${{ steps.filter.outputs.agentic-reasoning }}
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            data-acquisition:
              - 'data-acquisition/**'
            data-ingestion:
              - 'data-ingestion/**'
            agentic-reasoning:
              - 'agentic-reasoning/**'
            ui:
              - 'palantir-blueprint/**'

  python-lint-test:
    needs: changes
    if: |
      needs.changes.outputs['data-acquisition'] == 'true' ||
      needs.changes.outputs['data-ingestion'] == 'true' ||
      needs.changes.outputs['agentic-reasoning'] == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: data-acquisition
            changed: ${{ needs.changes.outputs['data-acquisition'] }}
          - module: data-ingestion
            changed: ${{ needs.changes.outputs['data-ingestion'] }}
          - module: agentic-reasoning
            changed: ${{ needs.changes.outputs['agentic-reasoning'] }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        if: matrix.changed == 'true'
        with:
          python-version: "3.11"
      - name: Install deps
        if: matrix.changed == 'true'
        working-directory: ${{ matrix.module }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install ruff pytest
      - name: Lint (ruff)
        if: matrix.changed == 'true'
        working-directory: ${{ matrix.module }}
        run: ruff check .
      - name: Unit tests (no live DB/docker)
        if: matrix.changed == 'true'
        working-directory: ${{ matrix.module }}
        run: pytest -m "not integration" --tb=short

  ui-lint-build:
    needs: changes
    if: needs.changes.outputs.ui == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: palantir-blueprint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: palantir-blueprint/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build

  # Single job every PR can require in branch protection,
  # even when path-filtered jobs above were skipped.
  ci-summary:
    needs: [changes, python-lint-test, ui-lint-build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.python-lint-test.result }}" == "failure" ] || [ "${{ needs.ui-lint-build.result }}" == "failure" ]; then
            echo "CI failed"
            exit 1
          fi
          echo "CI passed (or was correctly skipped for unrelated paths)"
